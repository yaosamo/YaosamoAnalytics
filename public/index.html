<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Yaosamo Analytics</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <div class="hero-copy">
          <span class="eyebrow">Yaosamo</span>
          <h1>Analytics</h1>
          <p class="hero-text">A compact view of traffic across your core projects.</p>
        </div>
        <form class="filters" id="rangeForm">
          <div class="preset-group" role="group" aria-label="Date range presets">
            <button type="button" class="preset-button" data-preset="7d">Last 7 days</button>
            <button type="button" class="preset-button" data-preset="30d">Last 30 days</button>
          </div>
          <div class="date-group">
            <label class="field">
              <span>From</span>
              <input id="startDate" name="start" type="date" />
            </label>
            <label class="field">
              <span>To</span>
              <input id="endDate" name="end" type="date" />
            </label>
            <button type="submit" class="apply-button">Apply</button>
          </div>
        </form>
      </section>

      <section class="feedback-row">
        <p class="status-text" id="statusText">Loading analytics…</p>
        <p class="status-text" id="rangeLabel">Loading...</p>
        <p class="status-text status-text-error" id="errorText" hidden></p>
      </section>

      <section class="grid" id="projectGrid"></section>
    </main>

    <template id="projectCardTemplate">
      <article class="card">
        <div class="card-head">
          <div>
            <p class="card-title"></p>
            <p class="card-subtitle"></p>
          </div>
        </div>

        <div class="stats">
          <div>
            <span class="meta-label">Visits</span>
            <strong class="stat-value visits"></strong>
          </div>
          <div>
            <span class="meta-label">Users</span>
            <strong class="stat-value muted">N/A</strong>
          </div>
        </div>

        <div class="sparkline-wrap">
          <div class="axis-labels">
            <span class="axis-top">0</span>
            <span class="axis-mid">0</span>
            <span class="axis-bottom">0</span>
          </div>
          <svg class="sparkline" viewBox="0 0 240 72" preserveAspectRatio="none"></svg>
        </div>
      </article>
    </template>

    <script type="module" src="/app.js"></script>
  </body>
  </html>
