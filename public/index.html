<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Yaosamo Analytics</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="status-strip">
        <div class="strip-cell strip-cell-wide">
          <span class="meta-label">Sector</span>
          <strong>Yaosamo analytics command board</strong>
        </div>
      </section>

      <section class="overview">
        <article class="overview-card">
          <span class="meta-label">Sector visits</span>
          <strong id="totalVisits">-</strong>
        </article>
        <article class="overview-card">
          <span class="meta-label">Lead station</span>
          <strong id="topProject">-</strong>
        </article>
        <article class="overview-card">
          <span class="meta-label">Operator count</span>
          <strong id="totalUsers">-</strong>
        </article>
        <article class="overview-card">
          <span class="meta-label">Window</span>
          <strong id="rangeLabel">Loading...</strong>
        </article>
      </section>

      <section class="grid" id="projectGrid"></section>
    </main>

    <template id="projectCardTemplate">
      <article class="card">
        <div class="card-head">
          <div>
            <p class="card-title"></p>
            <p class="card-subtitle"></p>
          </div>
          <span class="chip">Station</span>
        </div>

        <div class="stats">
          <div>
            <span class="meta-label">Visits</span>
            <strong class="stat-value visits"></strong>
          </div>
          <div>
            <span class="meta-label">Users</span>
            <strong class="stat-value muted">N/A</strong>
          </div>
          <div>
            <span class="meta-label">Active days</span>
            <strong class="stat-value active-days"></strong>
          </div>
          <div>
            <span class="meta-label">Last day</span>
            <strong class="stat-value latest"></strong>
          </div>
        </div>

        <div class="sparkline-wrap">
          <div class="axis-labels">
            <span class="axis-top">0</span>
            <span class="axis-mid">0</span>
            <span class="axis-bottom">0</span>
          </div>
          <svg class="sparkline" viewBox="0 0 240 72" preserveAspectRatio="none"></svg>
        </div>

        <div class="card-footer">
          <span class="footer-chip footer-chip-cyan">01</span>
          <span class="footer-chip footer-chip-green">ACT</span>
          <span class="footer-chip footer-chip-amber">LIVE</span>
        </div>
      </article>
    </template>

    <script type="module" src="/app.js"></script>
  </body>
  </html>
